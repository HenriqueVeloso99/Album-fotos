<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="video-container">
        <video autoplay muted loop playsinline id="bgvideo">
            <source id="videoSource" src="videos/duna.mp4" type="video/mp4">
        </video>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">

                <ul class="navbar-nav">


                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">

                            Temas: <span id="temaAtual" class="temaAtual">Duna</span>
                        </a>

                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" data-video="videos/duna.mp4">Duna</a></li>
                            <li><a class="dropdown-item" data-video="videos/dragao.mp4">Furia da Noite/Luz</a></li>
                            <li><a class="dropdown-item" data-video="videos/dragao2.mp4">Soluço e Banguela</a></li>
                            <li><a class="dropdown-item" data-video="videos/hogwarts.mp4">Hogwarts</a></li>
                            <li><a class="dropdown-item" data-video="videos/gyrados.mp4">Gyrados</a></li>
                            <li><a class="dropdown-item" data-video="videos/sylveon.mp4">Sylveon</a></li>
                        </ul>
                    </li>

                </ul>

            </div>
            <div id="buttons-container">
                <div id="mapas" class="button-menu">
                    <img type="button" class="mapas-icon" src="imagens/map_icon.png">
                    <span class="btn-label">Mapas</span>
                </div>

                <div id="presentes" class="button-menu">
                    <img src="imagens/gift_icon.png">
                    <span class="btn-label">Presentes</span>
                </div>

                <div id="cartas" class="button-menu">
                    <img type="button" class="carta-icon" src="imagens/letters_icon.png">
                    <span class="btn-label">Cartas</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="album-div" class="fechado">

        <div id="album-container" class="album-container">
            <img id="album" class="album-img" src="imagens/album-fechado.png" data-fechado="imagens/album-fechado.png"
                data-aberto="imagens/album-aberto.png">

            <div class="album-pages">

                <div class="foto-slot" data-index="0"></div>
                <div class="foto-slot" data-index="1"></div>

            </div>

            <div class="album-nav">

                <button id="paginaAnterior">⬅ Página Anterior</button>
                <button id="paginaProxima">Página Seguinte ➡</button>

            </div>
        </div>
    </div>

    <div id="visibilidade" class="button">
        <img type="button" class="visib-icon" src="imagens/eye_icon.png">
    </div>

    <div id="menu-main" class="menu-main">

        <div id="menu-close" class="menu-close">✕</div> <!-- FECHAR -->

        <!-- PRESENTES -->
        <div id="menu-presentes" class="menu-section active">

            <h1 class="menu-title">Presentes</h1>

            <div class="menu-grid">
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
            </div>
        </div>

        <!-- MAPAS -->
        <div id="menu-mapas" class="menu-section">
            <h1 class="menu-title">Mapas</h1>

            <div class="menu-grid mapas">
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
                <div class="menu-card"></div>
            </div>
        </div>

        <!-- CARTAS -->
        <div id="menu-cartas" class="menu-section">
            <h1 class="menu-title">Cartas</h1>

            <div class="menu-list">
                <div class="menu-letter"></div>
                <div class="menu-letter"></div>
                <div class="menu-letter"></div>
                <div class="menu-letter"></div>
            </div>
        </div>

    </div>

    <div id="modal" class="album-modal">

        <div class="album-modal-content">

            <div class="menu-close" id="modal-close">✕</div>

            <h1 id="modal-titulo"></h1>

            <div class="modal-body">

                <div class="modal-img-frame">
                    <img id="modal-img">
                </div>

                <div class="modal-text">

                    <p id="modal-data"></p>
                    <p id="modal-local"></p>
                    <p id="modal-motivo"></p>
                    <p id="modal-desc"></p>

                </div>

            </div>

        </div>

    </div>

    <script src="js/bootstrap.js"></script>
    <script src="js/main.js"></script>
    <script>

        //Troca de video tema
        function trocarVideo(caminhoDoVideo) {
            const video = document.getElementById('bgvideo');
            const source = document.getElementById('videoSource');

            source.src = caminhoDoVideo;

            video.load();

            video.play();
        }

        //Navbar
        const temaAtual = document.getElementById("temaAtual");
        const itensTema = document.querySelectorAll(".dropdown-item");

        itensTema.forEach(item => {
            item.addEventListener("click", (e) => {
                e.preventDefault();

                const nomeTema = item.textContent;
                const video = item.dataset.video;

                temaAtual.textContent = nomeTema;

                trocarVideo(video);
            });
        });

        //Album aberto e fechado
        const album = document.getElementById("album");
        const container = document.getElementById("album-container");
        const albumMonoLeft = "imagens/album_aberto_mono1.png";
        const albumMonoRight = "imagens/album_aberto_mono2.png";
        renderPresentes();
        renderMapas();
        renderCartas();

        let aberto = false;

        album.addEventListener("click", () => {

            if (aberto == true) { return }

            album.classList.add("fade");

            setTimeout(() => {

                aberto = true;

                album.src = album.dataset.aberto;

                album.classList.remove("fade");
                album.classList.add("aberto");
                container.classList.add("aberto");

                renderAlbum();

            }, 200);

        });

        //Botao Visibilidade
        const btn_visiblity = document.getElementById("visibilidade");

        let visibilidade = true;

        btn_visiblity.addEventListener("click", () => {

            visibilidade = !visibilidade;

            container.classList.toggle("hidden");

        });

        //Botoes Menu->
        const menuMain = document.getElementById("menu-main");
        let menuAtual = null
        const menuPresentes = document.getElementById("menu-presentes");
        const menuMapas = document.getElementById("menu-mapas");
        const menuCartas = document.getElementById("menu-cartas");

        function abrirMenu(menu) {

            if (menuMain.classList.contains("open") && menuAtual === menu) {
                menuMain.classList.remove("open");
                menuAtual = null;
                return;
            }
            menuMain.classList.add("open");

            menuPresentes.classList.remove("active");
            menuMapas.classList.remove("active");
            menuCartas.classList.remove("active");

            menu.classList.add("active");
            menuAtual = menu;
        }

        document.getElementById("presentes").onclick = () => abrirMenu(menuPresentes);
        document.getElementById("mapas").onclick = () => abrirMenu(menuMapas);
        document.getElementById("cartas").onclick = () => abrirMenu(menuCartas);

        const menuClose = document.getElementById("menu-close");

        menuClose.onclick = () => {
            menuMain.classList.remove("open");
        };

        //Sistemas de páginas
        let paginaAtual = 0;

        function renderAlbum() {

            const slots = document.querySelectorAll(".foto-slot");

            if (window.innerWidth <= 600) {

                const foto = dados.fotos[paginaAtual];

                if (foto) {
                    slots[0].style.backgroundImage = `url(${foto.img_album})`;
                }

                slots[1].style.backgroundImage = "";

                if (paginaAtual % 2 === 0) {
                    album.src = albumMonoLeft;
                } else {
                    album.src = albumMonoRight;
                }

            } else {

                album.src = album.dataset.aberto;

                const esquerda = dados.fotos[paginaAtual];
                const direita = dados.fotos[paginaAtual + 1];

                if (esquerda) {
                    slots[0].style.backgroundImage = `url(${esquerda.img})`;
                }

                if (direita) {
                    slots[1].style.backgroundImage = `url(${direita.img})`;
                }

            }

        }
        //Sistemas de itens menu
        function renderPresentes() {

            const container = document.querySelector("#menu-presentes .menu-grid");
            container.innerHTML = "";

            dados.presentes.forEach(presente => {

                const card = document.createElement("div");
                card.classList.add("menu-card");

                const img = document.createElement("img");
                img.src = presente.img;

                card.appendChild(img);

                card.onclick = () => abrirModal(presente);

                container.appendChild(card);

            });

        }

        function renderMapas() {

            const container = document.querySelector("#menu-mapas .menu-grid");
            container.innerHTML = "";

            dados.mapas.forEach(mapa => {

                const card = document.createElement("div");
                card.classList.add("menu-card");

                const img = document.createElement("img");
                img.src = mapa.img;

                card.appendChild(img);

                card.onclick = () => abrirModal(mapa);

                container.appendChild(card);

            });

        }

        function renderCartas() {

            const container = document.querySelector("#menu-cartas .menu-list");
            container.innerHTML = "";

            dados.cartas.forEach(carta => {

                const item = document.createElement("div");
                item.classList.add("menu-letter");

                const img = document.createElement("img");
                img.src = carta.img;

                item.appendChild(img);

                item.onclick = () => abrirModal(carta);

                container.appendChild(item);

            });

        }

        document.getElementById("paginaProxima").onclick = () => {

            if (!aberto) return;

            if (window.innerWidth <= 600) {

                if (paginaAtual + 1 < dados.fotos.length) {
                    paginaAtual += 1;
                }

            } else {

                if (paginaAtual + 2 < dados.fotos.length) {
                    paginaAtual += 2;
                }

            }

            renderAlbum();

        };

        document.getElementById("paginaAnterior").onclick = () => {

            if (!aberto) return;

            if (window.innerWidth <= 600) {

                if (paginaAtual - 1 >= 0) {
                    paginaAtual -= 1;
                }

            } else {

                if (paginaAtual - 2 >= 0) {
                    paginaAtual -= 2;
                }

            }

            renderAlbum();

        };

        //Abrir foto
        const modal = document.getElementById("modal");

        document.querySelectorAll(".foto-slot").forEach((slot, i) => {

            slot.addEventListener("click", () => {

                const foto = dados.fotos[paginaAtual + i];
                document.getElementById("modal-titulo").textContent = foto.data;

                document.getElementById("modal-img").src = foto.img;

                document.getElementById("modal-data").textContent = foto.data;
                document.getElementById("modal-local").textContent = foto.local;
                document.getElementById("modal-motivo").textContent = foto.motivo;
                document.getElementById("modal-desc").textContent = foto.texto;

                modal.classList.add("open");

            });

        });
        //Abrir itens menu
        function abrirModal(item) {

            document.getElementById("modal-img").src = item.img;

            document.getElementById("modal-titulo").textContent = item.titulo || "";

            document.getElementById("modal-desc").textContent =
                item.descricao || item.texto || "";

            document.getElementById("modal-data").textContent = "";
            document.getElementById("modal-local").textContent = "";
            document.getElementById("modal-motivo").textContent = "";


            modal.classList.add("open")

        }

        document.getElementById("modal-close").onclick = () => {
            modal.classList.remove("open");
        };

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
